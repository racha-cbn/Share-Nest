version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sharenest-postgres
    environment:
      POSTGRES_DB: sharenest
      POSTGRES_USER: sharenest
      POSTGRES_PASSWORD: sharenest123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharenest"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
