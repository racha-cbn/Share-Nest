version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sharenest-postgres-dev
    environment:
      POSTGRES_DB: sharenest_dev
      POSTGRES_USER: sharenest
      POSTGRES_PASSWORD: sharenest123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharenest -d sharenest_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
